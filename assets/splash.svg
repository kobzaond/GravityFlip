<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" width="1284" height="2778">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#05020f"/>
    </radialGradient>
    <radialGradient id="orb2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#7df9ff"/>
      <stop offset="70%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7df9ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7df9ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rift2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff006e"/>
      <stop offset="50%" stop-color="#8338ec"/>
      <stop offset="100%" stop-color="#3a86ff"/>
    </linearGradient>
  </defs>
  <rect width="1284" height="2778" fill="url(#bg2)"/>
  <!-- Background particles -->
  <circle cx="200" cy="500" r="3" fill="#7df9ff" opacity="0.4"/>
  <circle cx="1000" cy="800" r="4" fill="#ff006e" opacity="0.3"/>
  <circle cx="300" cy="2200" r="3" fill="#8338ec" opacity="0.4"/>
  <circle cx="900" cy="1800" r="2" fill="#3a86ff" opacity="0.5"/>
  <circle cx="150" cy="1400" r="3.5" fill="#7df9ff" opacity="0.3"/>
  <circle cx="1100" cy="1200" r="2.5" fill="#ff006e" opacity="0.4"/>
  <!-- Dimensional rings -->
  <ellipse cx="642" cy="1100" rx="400" ry="400" fill="none" stroke="url(#rift2)" stroke-width="1" opacity="0.15"/>
  <ellipse cx="642" cy="1100" rx="280" ry="280" fill="none" stroke="url(#rift2)" stroke-width="1.5" opacity="0.2"/>
  <!-- Glow -->
  <circle cx="642" cy="1100" r="180" fill="url(#glow2)"/>
  <!-- Ball -->
  <circle cx="642" cy="1100" r="90" fill="url(#orb2)"/>
  <ellipse cx="615" cy="1070" rx="28" ry="20" fill="#ffffff" opacity="0.7"/>
  <!-- Title -->
  <text x="642" y="1450" text-anchor="middle" font-family="sans-serif" font-size="90" font-weight="900" fill="#7df9ff" letter-spacing="12" opacity="0.9">GRAVITY</text>
  <text x="642" y="1560" text-anchor="middle" font-family="sans-serif" font-size="90" font-weight="900" fill="#ff006e" letter-spacing="12" opacity="0.9">FLIP</text>

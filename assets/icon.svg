<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#05020f"/>
    </radialGradient>
    <radialGradient id="orb" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#7df9ff"/>
      <stop offset="70%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7df9ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7df9ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff006e"/>
      <stop offset="50%" stop-color="#8338ec"/>
      <stop offset="100%" stop-color="#3a86ff"/>
    </linearGradient>
    <linearGradient id="trail1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff006e" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="trail2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8338ec" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8338ec" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Dimensional rift lines -->
  <ellipse cx="512" cy="512" rx="320" ry="320" fill="none" stroke="url(#rift)" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="512" cy="512" rx="240" ry="240" fill="none" stroke="url(#rift)" stroke-width="1" opacity="0.2"/>
  <ellipse cx="512" cy="512" rx="400" ry="400" fill="none" stroke="url(#rift)" stroke-width="1" opacity="0.15"/>
  <!-- Rift crack -->
  <path d="M512 200 Q530 350 512 430 Q490 480 512 512 Q540 550 512 600 Q480 680 512 824" fill="none" stroke="url(#rift)" stroke-width="3" opacity="0.7"/>
  <path d="M512 200 Q530 350 512 430 Q490 480 512 512 Q540 550 512 600 Q480 680 512 824" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Trailing particles -->
  <ellipse cx="320" cy="540" rx="30" ry="8" fill="url(#trail1)" transform="rotate(-15 320 540)"/>
  <ellipse cx="260" cy="580" rx="22" ry="6" fill="url(#trail2)" transform="rotate(-20 260 580)"/>
  <ellipse cx="380" cy="500" rx="36" ry="9" fill="url(#trail1)" transform="rotate(-8 380 500)"/>
  <!-- Small particles -->
  <circle cx="200" cy="300" r="3" fill="#7df9ff" opacity="0.6"/>
  <circle cx="780" cy="250" r="2" fill="#ff006e" opacity="0.5"/>
  <circle cx="820" cy="680" r="4" fill="#8338ec" opacity="0.4"/>
  <circle cx="180" cy="720" r="2.5" fill="#3a86ff" opacity="0.5"/>
  <circle cx="700" cy="400" r="2" fill="#7df9ff" opacity="0.4"/>
  <circle cx="350" cy="750" r="3" fill="#ff006e" opacity="0.3"/>
  <circle cx="650" cy="300" r="2.5" fill="#8338ec" opacity="0.5"/>
  <circle cx="400" cy="250" r="2" fill="#3a86ff" opacity="0.4"/>
  <!-- Glow behind ball -->
  <circle cx="512" cy="420" r="120" fill="url(#glow)"/>
  <!-- Ball -->
  <circle cx="512" cy="420" r="65" fill="url(#orb)"/>
  <!-- Ball specular -->
  <ellipse cx="490" cy="395" rx="20" ry="15" fill="#ffffff" opacity="0.7"/>
  <!-- Gravity arrows -->
  <path d="M512 560 L490 590 L504 590 L504 640 L520 640 L520 590 L534 590 Z" fill="#ff006e" opacity="0.9"/>
  <path d="M512 320 L534 290 L520 290 L520 240 L504 240 L504 290 L490 290 Z" fill="#3a86ff" opacity="0.5"/>
</svg>
